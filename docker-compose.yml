services:
  api:
    build: ./api
    env_file: .env
    volumes:
      - glucose-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/glucose/current"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  glucose-data:
